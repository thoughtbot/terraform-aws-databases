name: elasticache-redis/auth-token-secondary
on:
  pull_request:
    branches:
      - main
    paths:
      - elasticache-redis/auth-token-secondary/**
    types:
      - closed
      - opened
      - reopened
      - synchronize
jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    concurrency: ${{ github.workflow }}
    with:
      module: elasticache-redis/auth-token-secondary
    permissions:
      id-token: write
      contents: write
      checks: write
      pull-requests: write
