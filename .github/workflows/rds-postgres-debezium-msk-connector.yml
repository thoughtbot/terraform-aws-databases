name: rds-postgres/debezium-msk-connector
on:
  pull_request:
    branches:
      - main
    paths:
      - rds-postgres/debezium-msk-connector/**
    types:
      - closed
      - opened
      - reopened
      - synchronize
jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    concurrency: ${{ github.workflow }}
    with:
      module: rds-postgres/debezium-msk-connector
    permissions:
      id-token: write
      contents: write
      checks: write
      pull-requests: write
